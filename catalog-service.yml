server:
  port: 8082

springdoc:
  api-docs:
    path: /catalog/v3/api-docs
  swagger-ui:
    path: /catalog/swagger-ui.html

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/catalog_db?createDatabaseIfNotExist=true
    username: root
    password: 1234
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      host: redis
      port: 6379
  rabbitmq:
    host: rabbitmq

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
